services:
  vllm-llama3_2-nvfp4:
    build:
      context: .
      dockerfile: Dockerfile
    image: vllm-llama3_2-nvfp4:local
    container_name: vllm-llama3_2-nvfp4
    ports:
      - "30200:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - MAX_MODEL_LEN=8192
      - GPU_MEMORY_UTILIZATION=0.80
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s